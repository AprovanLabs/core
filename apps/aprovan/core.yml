Outputs:
  VPCId:
    Description: The ID of the VPC.
    Value: !Ref VPC
    Export:
      Name: AprovanVPCId

  PublicSubnetId:
    Description: The ID of the public subnet.
    Value: !Ref PublicSubnet
    Export:
      Name: AprovanPublicSubnetId

  LightsailInstanceId:
    Description: The ID of the Lightsail instance.
    Value: !Ref LightsailInstance
    Export:
      Name: AprovanLightsailInstanceId

